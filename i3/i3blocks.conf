# ~/.config/i3blocks/config
# Orden de los bloques (de izquierda a derecha)
order += ethernet
order += disk_root
order += disk_home
order += load
order += memory
order += cpu_temp
order += time

# Separador entre bloques (opcional)
separator_block_width=15
separator=true

[ethernet]
command=ip -o -4 route show default | awk '{print $5 " " $9}' | head -1 || echo "down"
interval=10
color=#55aaff          # Azul fijo (o pon script para up/down)
# Para colores dinámicos: haz un script bash que imprima \n#color si down

[disk_root]
command=df -h / | awk 'NR==2 {printf " /: %s/%s (%s)", $3, $2, $5}'
interval=30
color=#ffaa66          # Naranja fijo
# Para alerta >90%: usa un script (ver abajo)

[disk_home]
command=df -h /home | awk 'NR==2 {printf "/home: %s/%s (%s)", $3, $2, $5}'
interval=30
color=#aaffaa          # Verde menta fijo

[load]
command=uptime | awk -F 'load average:' '{ print $2 }' | awk '{print $1}'
interval=10
color=#cc88ff          # Magenta

[memory]
command=free -h | awk '/Mem:/ {printf "%s/%s", $3, $2}'
interval=5
color=#88ffff          # Cian

[cpu_temp]
command=sensors k10temp-pci-00c3 | awk '/Tctl:/ {print $2}' || echo "??°C"
# O usa: cat /sys/class/hwmon/hwmon*/temp1_input | awk '{printf "%.0f°C", $1/1000}'
interval=5
color=#ff9966          # Naranja suave
# Para rojo si >85: script abajo

[time]
command=date '+%Y-%m-%d %H:%M:%S'
interval=1
color=#ffffff          # Gris claro
